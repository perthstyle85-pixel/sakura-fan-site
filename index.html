<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sakura Ultimate Fan</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at center, #2a003f, #000000);
    color: white;
    text-align: center;
}

header {
    padding: 60px 20px;
    background: linear-gradient(90deg, #ff69b4, #ff1493);
    box-shadow: 0 0 30px #ff1493;
}

section {
    padding: 40px 20px;
    max-width: 900px;
    margin: auto;
}

.gallery {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

img {
    width: 90%;
    max-width: 260px;
    border-radius: 15px;
    margin: 10px;
    cursor: pointer;
    transition: 0.3s;
}

img:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px #ff1493;
}

/* OVERLAY */
#overlay {
    position: fixed;
    display: none;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

#overlay img {
    max-width: 90%;
    max-height: 90%;
}

h2 {
    color: #ff69b4;
}
</style>

</head>

<body>

<header>
    <h1>🌸 Sakura Haruno — Elite Fan Zone 🌸</h1>
</header>

<section class="gallery">

    <img src="https://rule34ai.art/wp-content/uploads/2023/11/Sakura-Haruno-after-sex-ahegao.jpg">
    <img src="https://r34xyz.b-cdn.net/posts/323/323982/323982.small.jpg">
    <img src="https://rule34xyz.b-cdn.net/posts/4336/4336779/4336779.picsmall.jpg">
    <img src="https://rule34ai.art/wp-content/uploads/2024/07/Sakura-Haruno-sex-on-the-beach.jpeg">
    <img src="https://www.narutohentaidb.com/_data/i/upload/2015/02/08/20150208033911-00723f40-me.jpg">
    <img src="https://cdn.donmai.us/original/13/44/1344f0c3556ee29503e79785509a9bad.png">

</section>

<!-- OVERLAY -->
<div id="overlay" onclick="this.style.display='none'">
    <img id="overlayImg">
</div>

<script>
const imgs = document.querySelectorAll(".gallery img");
const overlay = document.getElementById("overlay");
const overlayImg = document.getElementById("overlayImg");

imgs.forEach(img => {
    img.onclick = () => {
        overlay.style.display = "flex";
        overlayImg.src = img.src;
    }
});
</script>

</body>
</html>
